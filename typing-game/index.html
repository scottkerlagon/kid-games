<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shapes" id="bgShapes"></div>
    <div class="container">
        <button id="sound-toggle" class="sound-btn">🔊</button>

        <!-- Screen 1: Profile Select -->
        <div id="screen-profile">
            <a href="../index.html" class="back-link">Back to Launcher</a>
            <h1>Typing Game</h1>
            <p class="subtitle">Choose Your Profile</p>
            <div id="profile-list"></div>
            <div class="profile-create">
                <input type="text" id="profile-name-input" placeholder="Enter your name">
                <button id="create-profile-btn" class="btn btn-primary">Create Profile</button>
            </div>
        </div>

        <!-- Screen 2: Level Select -->
        <div id="screen-levels" style="display:none">
            <h2>Welcome, <span id="active-profile-name"></span>!</h2>
            <div id="level-list" class="level-buttons"></div>
            <div id="mode-selector" style="display:none">
                <h3 id="mode-level-name"></h3>
                <div class="mode-buttons">
                    <button id="mode-practice-btn" class="btn btn-primary">Practice (5 words)</button>
                    <button id="mode-timed-30-btn" class="btn btn-primary">Timed 30s</button>
                    <button id="mode-timed-60-btn" class="btn btn-primary">Timed 60s</button>
                </div>
                <button id="mode-back-btn" class="btn btn-small" style="margin-top:15px">Back</button>
            </div>
            <button id="change-profile-btn" class="btn btn-primary">Change Profile</button>
        </div>

        <!-- Screen 3: Typing Screen -->
        <div id="screen-typing" style="display:none">
            <h2 id="level-name"></h2>
            <div id="timer-display" style="display:none"><span id="time-remaining">30</span>s</div>
            <div id="word-counter">Word 1 of 5</div>
            <div id="word-display"></div>
            <div id="streak-display"><span id="streak-count">0</span> <span id="streak-label">streak</span></div>
            <div id="keyboard-container"></div>
            <div id="results" style="display:none">
                <div id="result-wpm"></div>
                <div id="result-accuracy"></div>
                <div id="result-streak"></div>
                <div id="result-words-completed" style="display:none"></div>
                <div id="result-best" style="display:none"></div>
                <div class="btn-group">
                    <button id="play-again-btn" class="btn btn-primary">Play Again</button>
                    <button id="back-to-levels-btn" class="btn btn-primary">Back to Levels</button>
                </div>
            </div>
        </div>

        <!-- Stats Overlay -->
        <div id="stats-overlay" class="overlay" style="display:none">
            <div class="overlay-content">
                <h3 id="stats-overlay-title"></h3>
                <canvas id="stats-chart" width="350" height="200"></canvas>
                <div class="btn-group">
                    <button id="chart-wpm-btn" class="btn btn-small btn-primary">WPM</button>
                    <button id="chart-acc-btn" class="btn btn-small">Accuracy</button>
                </div>
                <button id="stats-close-btn" class="btn btn-small" style="margin-top:10px">Close</button>
            </div>
        </div>

    </div>
    <script src="app.js" defer></script>
    <script>
        // Floating background shapes (matches launcher theme)
        var shapeColors = ['#64B5F6','#90CAF9','#42A5F5','#BBDEFB','#E3F2FD','#81D4FA','#4FC3F7','#29B6F6'];
        var shapesContainer = document.getElementById('bgShapes');

        function createShape() {
            var shape = document.createElement('div');
            shape.className = 'shape';
            var size = Math.random() * 80 + 20;
            var color = shapeColors[Math.floor(Math.random() * shapeColors.length)];
            var left = Math.random() * 100;
            var duration = Math.random() * 10 + 8;
            var delay = Math.random() * 5;

            shape.style.width = size + 'px';
            shape.style.height = size + 'px';
            shape.style.background = color;
            shape.style.left = left + '%';
            shape.style.animationDuration = duration + 's';
            shape.style.animationDelay = delay + 's';

            shapesContainer.appendChild(shape);

            setTimeout(function() { shape.remove(); }, (duration + delay) * 1000);
        }

        // Create initial batch and keep spawning
        for (var i = 0; i < 15; i++) createShape();
        setInterval(createShape, 1200);
    </script>
</body>
</html>
