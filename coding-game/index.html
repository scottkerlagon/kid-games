<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Background Shapes -->
    <div class="bg-shapes" id="bgShapes"></div>

    <!-- Profile Select Screen -->
    <div id="profile-screen" class="screen">
        <a href="../index.html" class="back-link">&#8592; Back to Launcher</a>
        <h1>Coding Game</h1>
        <p class="subtitle">Guide the bot to the goal!</p>
        <div id="profile-list"></div>
        <div class="profile-create">
            <input type="text" id="profile-name-input" placeholder="Enter your name" maxlength="20">
            <button id="create-profile-btn" class="btn btn-primary">Create Profile</button>
        </div>
    </div>

    <!-- Level Select Screen -->
    <div id="level-screen" class="screen" style="display:none">
        <div class="level-header">
            <button id="change-profile-btn" class="btn btn-secondary">&#8592; Change Profile</button>
            <h1>Select a Level</h1>
            <p id="level-profile-name" class="subtitle"></p>
            <div id="star-progress" class="star-progress">
                <span class="star-progress-icon">&#11088;</span>
                <span id="star-count">0 / 24 Stars</span>
                <div class="star-progress-track">
                    <div id="star-progress-bar" class="star-progress-bar"></div>
                </div>
            </div>
        </div>
        <div id="level-grid" class="level-grid"></div>
        <div id="achievements-section" class="achievements-section">
            <h3>Achievements</h3>
            <div id="achievements-grid" class="achievements-grid"></div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen" style="display:none">
        <div class="game-header">
            <button id="back-to-levels-btn" class="btn btn-secondary">&#8592; Back to Levels</button>
            <button id="mute-btn" class="mute-btn" title="Toggle sound">&#128266;</button>
            <h2 id="level-title"></h2>
            <p id="level-hint" class="hint"></p>
        </div>
        <div id="confetti-container" class="confetti-container"></div>
        <div class="game-layout">
            <div class="game-left">
                <div id="grid-container" class="grid-container">
                    <div id="bot" class="bot">&#9650;</div>
                </div>
            </div>
            <div class="game-right">
                <h3>Commands</h3>
                <div class="speed-control">
                    <button class="speed-btn" data-speed="slow">&#x1F422; Slow</button>
                    <button class="speed-btn active" data-speed="normal">&#9654; Normal</button>
                    <button class="speed-btn" data-speed="fast">&#9889; Fast</button>
                </div>
                <div class="command-palette">
                    <button class="cmd-btn cmd-forward" data-command="forward">&#9650; Forward</button>
                    <button class="cmd-btn cmd-left" data-command="left">&#8624; Left</button>
                    <button class="cmd-btn cmd-right" data-command="right">&#8625; Right</button>
                    <button class="cmd-btn cmd-jump" data-command="jump">&#10224; Jump</button>
                </div>
                <h3>Your Sequence</h3>
                <div id="command-sequence" class="command-sequence"></div>
                <div class="action-buttons">
                    <button id="run-btn" class="btn btn-run">&#9654; Run</button>
                    <button id="reset-btn" class="btn btn-reset">&#8634; Reset</button>
                </div>
            </div>
        </div>
        <div id="result-overlay" class="result-overlay" style="display:none">
            <div class="result-content">
                <h2 id="result-title"></h2>
                <p id="result-message"></p>
                <div id="result-buttons"></div>
            </div>
        </div>
    </div>

    <script>
        // Floating background shapes (matches launcher theme)
        (function() {
            var colors = ['#FFCC80','#FFB74D','#FFA726','#FF9800','#FB8C00','#F57C00','#EF6C00','#FFE0B2'];
            var shapesContainer = document.getElementById('bgShapes');

            function createShape() {
                var shape = document.createElement('div');
                shape.classList.add('shape');
                var size = Math.random() * 80 + 20;
                var color = colors[Math.floor(Math.random() * colors.length)];
                var left = Math.random() * 100;
                var duration = Math.random() * 10 + 8;
                var delay = Math.random() * 5;

                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.background = color;
                shape.style.left = left + '%';
                shape.style.animationDuration = duration + 's';
                shape.style.animationDelay = delay + 's';

                shapesContainer.appendChild(shape);

                setTimeout(function() { shape.remove(); }, (duration + delay) * 1000);
            }

            // Create initial batch and keep spawning
            for (var i = 0; i < 15; i++) createShape();
            setInterval(createShape, 1200);
        })();
    </script>
    <script src="app.js"></script>
</body>
</html>
